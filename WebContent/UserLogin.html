<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>User Login | E-Trains</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
  :root{
    --accent: #00a8e8;
    --deep: #00345a;
    --glass-bg: rgba(255,255,255,0.10);
    --glass-border: rgba(255,255,255,0.18);
  }

  *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
  }

  body{
    min-height:100vh;
    background: linear-gradient(180deg, #0f3b57 0%, #05324b 100%);
    color:#fff;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    padding:32px;
  }

  /* Main layout container */
  .app{
    width:1100px;
    max-width:calc(100% - 48px);
    height:680px;
    display:grid;
    grid-template-columns:1fr 460px;
    border-radius:14px;
    overflow:hidden;
    box-shadow:0 20px 50px rgba(2,10,23,0.6);
    position:relative;
  }

  /* LEFT PANEL WITH TRAIN IMAGE */
  .left{
    position:relative;
    padding:24px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#03273f;
  }

  /* ⭐ Improved Train Background */
  .left::before{
    content:"";
    position:absolute;
    inset:0;

    background:
      linear-gradient(90deg,
        rgba(3, 37, 62, 0.75) 0%,
        rgba(3, 37, 62, 0.45) 40%,
        rgba(3, 37, 62, 0.85) 100%
      ),
      url("images/Train.png");

    background-size: contain;          /* Full visible train */
    background-repeat: no-repeat;
    background-position: left bottom;  /* Perfect alignment */
    z-index:0;
  }

  .branding{
    position:relative;
    z-index:1;
    width:85%;
    max-width:520px;
  }

  .branding h1{
    font-size:2.4rem;
    font-weight:600;
    margin-bottom:8px;
  }

  .branding p{
    font-size:1rem;
    opacity:0.9;
    margin-top:8px;
    max-width:420px;
    line-height:1.5;
  }

  /* RIGHT PANEL */
  .right{
    display:flex;
    align-items:center;
    justify-content:center;
    padding:48px 36px;
  }

  .card{
    width:100%;
    max-width:380px;
    background:var(--glass-bg);
    border:1px solid var(--glass-border);
    padding:34px 28px;
    border-radius:12px;
    backdrop-filter:blur(12px);
    box-shadow:0 8px 30px rgba(2,10,23,0.45);
    color:#fff;
  }

  .menu{
    display:flex;
    gap:8px;
    justify-content:center;
    margin-bottom:14px;
  }

  .menu a{
    padding:6px 12px;
    border-radius:8px;
    background:rgba(255,255,255,0.06);
    color:#fff;
    text-decoration:none;
    font-size:0.9rem;
  }

  .menu a.active{
    background:rgba(255,255,255,0.14);
  }

  h2{
    text-align:center;
    margin-bottom:18px;
    font-size:1.5rem;
    font-weight:600;
  }

  .form-group{
    margin-bottom:14px;
  }

  label{
    display:block;
    margin-bottom:6px;
    opacity:0.9;
  }

  input[type="text"], input[type="password"]{
    width:100%;
    padding:12px;
    border-radius:8px;
    border:none;
    outline:none;
    background:rgba(255,255,255,0.85);
    font-size:0.95rem;
  }

  .btn{
    width:100%;
    background:linear-gradient(90deg,#00a8e8,#007bb5);
    border:none;
    padding:12px;
    color:#fff;
    border-radius:8px;
    font-weight:600;
    cursor:pointer;
    margin-top:8px;
  }

  .links{
    margin-top:12px;
    text-align:center;
  }

  .links a{
    color:#fff;
    font-weight:500;
    text-decoration:underline;
  }

  /* COPYRIGHT BELOW CONTENT */
  .copyright{
    margin-top:18px;
    text-align:center;
    opacity:0.85;
    font-size:0.95rem;
    color:#fff;
  }

  /* RESPONSIVE */
  @media(max-width:900px){
    .app{
      grid-template-columns:1fr;
      height:auto;
    }
    .left{
      order:2;
      padding:18px;
      min-height:260px;
    }
    .right{
      order:1;
    }
  }
</style>
</head>

<body>

<!-- MAIN CARD -->
<div class="app">

  <!-- LEFT PANEL -->
  <section class="left">
    <div class="branding">
      <h1>Train Booking System</h1>
      <p>
        Fast, secure and easy ticket booking. Search trains, check availability and manage bookings from a single account.
      </p>
    </div>
  </section>

  <!-- RIGHT PANEL -->
  <aside class="right">
    <div class="card">

      <div class="menu">
        <a href="UserLogin.html" class="active">Login as User</a>
        <a href="UserRegister.html">New User Register</a>
        <a href="AdminLogin.html">Login as Admin</a>
      </div>

      <h2>User Login</h2>

      <form action="userlogin" method="post">
        <div class="form-group">
          <label for="uname">Email</label>
          <input id="uname" name="uname" type="text" placeholder="Enter your Email ID" required />
        </div>

        <div class="form-group">
          <label for="pword">Password</label>
          <input id="pword" name="pword" type="password" placeholder="Enter your Password" required />
        </div>

        <button class="btn" type="submit">Login</button>
      </form>

      <div class="links">
        <p>New here? <a href="UserRegister.html">Create an account</a></p>
      </div>

    </div>
  </aside>

</div> 

<!-- COPYRIGHT BELOW IMAGE + LOGIN BOX -->
<div class="copyright">
  &copy; 2026 Train Booking System | All Rights Reserved
</div>

</body>
</html>
