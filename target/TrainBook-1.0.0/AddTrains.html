<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Train | E-Trains Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
/* Global Reset */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: linear-gradient(135deg, #f0f7ff, #ffffff);
  color: #333;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* Header */
header {
  background-color: #00264d;
  color: white;
  padding: 1rem 2rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
}

header h1 {
  font-size: 1.8rem;
  font-weight: 600;
}

nav ul {
  list-style: none;
  display: flex;
  flex-wrap: wrap;
  gap: 1rem;
}

nav a {
  color: white;
  text-decoration: none;
  background-color: rgba(255,255,255,0.2);
  padding: 6px 12px;
  border-radius: 6px;
  transition: all 0.3s ease;
  font-weight: 500;
}

nav a:hover {
  background-color: white;
  color: #00264d;
}

.logout-btn {
  background-color: #e74c3c;
}

.logout-btn:hover {
  background-color: #c0392b;
  color: white;
}

/* Page Title */
.page-title {
  text-align: center;
  color: #00264d;
  font-size: 2rem;
  margin-top: 2rem;
  font-weight: 600;
}

/* Form Container */
.form-container {
  background: white;
  width: 450px;
  margin: 2rem auto;
  padding: 2rem 2.5rem;
  border-radius: 15px;
  box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
}

form {
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

label {
  font-weight: 500;
  color: #00264d;
  font-size: 0.95rem;
}

input[type="text"] {
  width: 100%;
  padding: 10px;
  border: 1.5px solid #ccc;
  border-radius: 6px;
  font-size: 0.95rem;
  outline: none;
  transition: border-color 0.3s;
}

input[type="text"]:focus {
  border-color: #00a8e8;
}

input[type="submit"] {
  background-color: #00a8e8;
  color: white;
  border: none;
  padding: 12px;
  font-weight: 600;
  border-radius: 6px;
  font-size: 1rem;
  cursor: pointer;
  transition: background-color 0.3s ease;
}

input[type="submit"]:hover {
  background-color: #007bb5;
}

/* Footer */
footer {
  background-color: #00264d;
  color: white;
  text-align: center;
  padding: 1rem;
  font-size: 0.9rem;
  margin-top: auto;
}
</style>
</head>

<body>
  <header>
    <h1>Railway Reservation System</h1>
    <nav>
      <ul>
        <li><a href="AdminHome.html">Home</a></li>
        <li><a href="adminviewtrainfwd">View Trains</a></li>
        <li><a href="adminsearchtrainfwd">Search Train</a></li>
        <li><a href="addtrainfwd" class="active">Add Train</a></li>
        <li><a href="cancletrainfwd">Delete Train</a></li>
        <li><a href="updatetrain">Update Train</a></li>
        <li><a href="adminlogout" class="logout-btn">Logout</a></li>
      </ul>
    </nav>
  </header>

  <h2 class="page-title">Add New Train</h2>

  <div class="form-container">
    <form action="adminaddtrain" method="post">
      <label>Train Number:</label>
      <input type="text" name="trainno" placeholder="Enter Train Number" required>

      <label>Train Name:</label>
      <input type="text" name="trainname" placeholder="Enter Train Name" required>

      <label>From Station:</label>
      <input type="text" name="fromstation" placeholder="Enter Starting Station" required>

      <label>To Station:</label>
      <input type="text" name="tostation" placeholder="Enter Destination Station" required>

      <label>Available Seats:</label>
      <input type="text" name="available" placeholder="Enter Number of Available Seats" required>

      <label>Fare (INR):</label>
      <input type="text" name="fare" placeholder="Enter Fare" required>

      <input type="submit" value="Add Train">
    </form>
  </div>

  <footer>
    &copy; Railway Reservation System | Admin Dashboard
  </footer>
</body>
</html>
