<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment | E-Trains</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
/* Global Reset */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: linear-gradient(135deg, #f0f7ff, #ffffff);
  color: #333;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* Header */
header {
  background-color: #00264d;
  color: white;
  padding: 1rem 2rem;
  display: flex;
  flex-direction: column;
  align-items: center;
}

header h1 {
  font-size: 1.8rem;
  font-weight: 600;
  margin-bottom: 1rem;
}

/* Navigation Menu */
nav ul {
  list-style: none;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 0.8rem;
}

nav a {
  color: white;
  text-decoration: none;
  background-color: rgba(255,255,255,0.2);
  padding: 8px 14px;
  border-radius: 6px;
  font-weight: 500;
  transition: all 0.3s ease;
}

nav a:hover,
nav a.active {
  background-color: white;
  color: #00264d;
}

.logout-btn {
  background-color: #e74c3c;
}

.logout-btn:hover {
  background-color: #c0392b;
  color: white;
}

/* Page Title */
.page-title {
  text-align: center;
  color: #00264d;
  font-size: 2rem;
  margin-top: 2rem;
  font-weight: 600;
}

/* Payment Container */
.payment-container {
  background: white;
  width: 420px;
  margin: 2rem auto;
  padding: 2rem 2.5rem;
  border-radius: 15px;
  box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
  text-align: center;
}

.payment-container img {
  width: 60px;
  margin: 0 10px;
  filter: drop-shadow(0 2px 3px rgba(0,0,0,0.2));
}

/* Form Styling */
form {
  display: flex;
  flex-direction: column;
  gap: 1rem;
  margin-top: 1.5rem;
}

label {
  font-weight: 500;
  color: #00264d;
  font-size: 0.95rem;
  text-align: left;
}

input[type="text"],
input[type="tel"] {
  width: 100%;
  padding: 10px;
  border: 1.5px solid #ccc;
  border-radius: 6px;
  font-size: 0.95rem;
  outline: none;
  transition: border-color 0.3s;
}

input:focus {
  border-color: #00a8e8;
}

.input-group {
  display: flex;
  justify-content: space-between;
  gap: 1rem;
}

input.small-input {
  width: 100%;
}

button, input[type="submit"] {
  background-color: #00a8e8;
  color: white;
  border: none;
  padding: 12px;
  font-weight: 600;
  border-radius: 6px;
  font-size: 1rem;
  cursor: pointer;
  transition: background-color 0.3s ease;
}

button:hover, input[type="submit"]:hover {
  background-color: #007bb5;
}

/* Footer */
footer {
  background-color: #00264d;
  color: white;
  text-align: center;
  padding: 1rem;
  font-size: 0.9rem;
  margin-top: auto;
}
</style>
</head>

<body>
  <header>
    <h1>Railway Reservation System</h1>
    <nav>
      <ul>
        <li><a href="userhome">Home</a></li>
        <li><a href="userviewtrainfwd">View Trains</a></li>
        <li><a href="trainbwstnfwd">Between Stations</a></li>
        <li><a href="bookingdetails">Booking History</a></li>
        <li><a href="fareenqfwd">Fare Enquiry</a></li>
        <li><a href="useravailfwd">Seat Availability</a></li>
        <li><a href="usersearchtrain">Search Train</a></li>
        <li><a href="userprofile">Profile</a></li>
        <li><a href="userlogout" class="logout-btn">Logout</a></li>
      </ul>
    </nav>
  </header>

  <h2 class="page-title">Card Payment Gateway</h2>

  <div class="payment-container">
    <div class="card-icons">
      <img src="https://cdn0.iconfinder.com/data/icons/credit-card-debit-card-payment-PNG/128/Mastercard-Curved.png" alt="MasterCard">
      <img src="https://cdn0.iconfinder.com/data/icons/credit-card-debit-card-payment-PNG/128/Visa-Curved.png" alt="Visa">
      <img src="https://cdn0.iconfinder.com/data/icons/credit-card-debit-card-payment-PNG/128/Paypal-Curved.png" alt="PayPal">
      <img src="https://cdn0.iconfinder.com/data/icons/credit-card-debit-card-payment-PNG/128/American-Express-Curved.png" alt="AmEx">
    </div>

    <form action="booktrains" method="post">
      <label for="cardnumber">Card Number:</label>
      <input type="tel" id="cardnumber" placeholder="Valid Card Number" required>

      <div class="input-group">
        <div>
          <label for="expdate">Expiration (MM/YY):</label>
          <input type="tel" id="expdate" class="small-input" placeholder="MM / YY" required>
        </div>
        <div>
          <label for="cvv">CV Code:</label>
          <input type="tel" id="cvv" class="small-input" placeholder="CVC" required>
        </div>
      </div>

      <label for="owner">Card Owner:</label>
      <input type="text" id="owner" placeholder="Cardholder Name" required>

      <input type="submit" value="Confirm Payment">
    </form>
  </div>

  <footer>
    &copy; 2025 Railway Reservation System | E-Trains Payment Gateway
  </footer>
</body>
</html>
