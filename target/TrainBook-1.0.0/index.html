<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-Trains | Railway Reservation System</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
/* Global Reset */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: linear-gradient(135deg, #e8f1ff, #ffffff);
  color: #333;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* Header */
header {
  background-color: #00264d;
  color: white;
  padding: 1rem 2rem;
  display: flex;
  flex-direction: column;
  align-items: center;
}

header h1 {
  font-size: 1.8rem;
  font-weight: 600;
  margin-bottom: 1rem;
}

/* Navigation Menu */
nav ul {
  list-style: none;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 0.8rem;
}

nav a {
  color: white;
  text-decoration: none;
  background-color: rgba(255,255,255,0.2);
  padding: 8px 14px;
  border-radius: 6px;
  font-weight: 500;
  transition: all 0.3s ease;
}

nav a:hover {
  background-color: white;
  color: #00264d;
}

/* Login Section */
.login-section {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin: 3rem auto;
  text-align: center;
}

.login-box {
  background: white;
  padding: 2rem 2.5rem;
  border-radius: 15px;
  box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
  width: 350px;
}

.login-box h2 {
  color: #00264d;
  margin-bottom: 1.5rem;
  font-weight: 600;
}

form {
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

label {
  text-align: left;
  font-weight: 500;
  color: #00264d;
  font-size: 0.95rem;
}

input[type="text"],
input[type="password"] {
  width: 100%;
  padding: 10px;
  border: 1.5px solid #ccc;
  border-radius: 6px;
  font-size: 0.95rem;
  outline: none;
  transition: border-color 0.3s;
}

input:focus {
  border-color: #00a8e8;
}

input[type="submit"] {
  background-color: #00a8e8;
  color: white;
  border: none;
  padding: 12px;
  font-weight: 600;
  border-radius: 6px;
  font-size: 1rem;
  cursor: pointer;
  transition: background-color 0.3s ease;
}

input[type="submit"]:hover {
  background-color: #007bb5;
}

.extra-links {
  margin-top: 1rem;
  font-size: 0.9rem;
}

.extra-links a {
  color: #007bb5;
  text-decoration: none;
  font-weight: 500;
}

.extra-links a:hover {
  text-decoration: underline;
}

/* Footer */
footer {
  background-color: #00264d;
  color: white;
  text-align: center;
  padding: 1.2rem;
  font-size: 0.9rem;
  margin-top: auto;
}

footer a {
  color: #00a8e8;
  text-decoration: none;
}

footer a:hover {
  text-decoration: underline;
}
</style>
</head>

<body>
  <header>
    <h1>Railway Reservation System</h1>
    <nav>
      <ul>
        <li><a href="UserLogin.html">Login</a></li>
        <li><a href="UserRegister.html">Register</a></li>
        <li><a href="AdminLogin.html">Admin</a></li>
      </ul>
    </nav>
  </header>

  <section class="login-section">
    <div class="login-box">
      <h2>User Login</h2>
      <form action="userlogin" method="post">
        <label for="uname">Email:</label>
        <input type="text" id="uname" name="uname" placeholder="Enter your Email ID" required>

        <label for="pword">Password:</label>
        <input type="password" id="pword" name="pword" placeholder="Enter your Password" required>

        <input type="submit" value="Login">
      </form>
      <div class="extra-links">
        <p>New here? <a href="UserRegister.html">Register Now</a></p>
        <p>Admin? <a href="AdminLogin.html">Login as Admin</a></p>
      </div>
    </div>
  </section>

  <footer>
    <address>
      Contact: Mr. Aman Kumar Singh | 
      Email: <a href="amanthegeekguy@gmail.com">amanthegeekguy@gmail.com</a> |
      Phone: 1234567890
    </address>
  </footer>
</body>
</html>
